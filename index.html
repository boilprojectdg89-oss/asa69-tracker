<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060609">
<title>ASA 69 — Lead Tracker | DP Design Living</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Noto Sans Thai','SF Pro Display',-apple-system,sans-serif;background:#060609;color:#e0e7ff;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(129,140,248,0.2);border-radius:2px}
select option{background:#1a1a2e;color:#e0e7ff}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.2)!important}
input,textarea,select,button{font-family:inherit}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:slideUp 0.3s ease-out}
.fi{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#e0e7ff;font-size:13px;outline:none}
.fi:focus{border-color:rgba(129,140,248,0.4);background:rgba(255,255,255,0.06)}
textarea.fi{resize:vertical;min-height:60px}
.btn{padding:12px 24px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s}
.bp{background:linear-gradient(135deg,#818cf8,#a78bfa);color:#fff}
.bp:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(129,140,248,0.3)}
.bp:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
.bg{background:transparent;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.6)}
.chip{padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);color:rgba(255,255,255,0.5);font-size:12px;cursor:pointer;transition:all 0.2s}
.chip.on{border-color:#818cf8;background:rgba(129,140,248,0.15);color:#c7d2fe}
.pcard{padding:14px 16px;border-radius:14px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:rgba(255,255,255,0.6);cursor:pointer;text-align:left;transition:all 0.2s;display:flex;align-items:center;gap:10px}
.pcard.on{border-color:#818cf8;background:rgba(129,140,248,0.12);color:#e0e7ff}
.card{background:rgba(255,255,255,0.02);border-radius:16px;padding:16px;border:1px solid rgba(255,255,255,0.05)}
.tab{flex:1;padding:10px 8px;border-radius:10px 10px 0 0;border:none;background:transparent;color:rgba(255,255,255,0.3);font-size:13px;font-weight:400;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s}
.tab.on{background:rgba(129,140,248,0.1);color:#c7d2fe;font-weight:700;border-bottom-color:#818cf8}
.mono{font-family:'JetBrains Mono',monospace}
.lbl{font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:5px;font-weight:600;letter-spacing:0.5px}
.mchip{padding:4px 10px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);font-size:11px;color:rgba(255,255,255,0.6);display:inline-block}
.ptag{padding:3px 8px;border-radius:10px;background:rgba(129,140,248,0.1);color:#c7d2fe;font-size:10px;display:inline-block}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

const PRODUCTS=[
  {id:"toilet",label:"สุขภัณฑ์",icon:"🚽",brands:["Kohler","Toto","Cotto","American Standard"]},
  {id:"faucet",label:"ก๊อกน้ำ",icon:"🚿",brands:["Grohe","Kohler","Toto"]},
  {id:"basin",label:"อ่างล้างหน้า",icon:"🪥",brands:["Kohler","Cotto","American Standard"]},
  {id:"bathtub",label:"อ่างอาบน้ำ",icon:"🛁",brands:["Kohler","Toto"]},
  {id:"shower",label:"ฝักบัว/เรนชาวเวอร์",icon:"💧",brands:["Grohe","Kohler"]},
  {id:"accessories",label:"อุปกรณ์เสริม",icon:"🔧",brands:["Grohe","Kohler","Cotto"]},
  {id:"drain",label:"MAGdrain",icon:"⬇️",brands:["MAGdrain"]},
];
const PRI=[
  {id:"hot",label:"🔥 Hot",color:"#ef4444",desc:"ต้องการซื้อทันที"},
  {id:"warm",label:"☀️ Warm",color:"#f59e0b",desc:"สนใจ ต้อง follow up"},
  {id:"cold",label:"❄️ Cold",color:"#6b7280",desc:"แค่ดูทั่วไป"},
];
const CTYPES=["เจ้าของบ้าน","สถาปนิก","ผู้รับเหมา","Interior Designer","Developer/โครงการ","ร้านค้า/Dealer","อื่นๆ"];
const DAYS=["Day 1","Day 2","Day 3","Day 4","Day 5"];
const RCOL=["#818cf8","#f472b6","#34d399","#fbbf24","#60a5fa","#fb923c","#a78bfa","#4ade80","#f87171","#38bdf8"];
const gid=()=>Date.now().toString(36)+Math.random().toString(36).substr(2,5);
const tdy=()=>new Date().toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"2-digit"});

class API{
  constructor(u){this.u=u}
  async getAll(){const r=await fetch(this.u+"?action=getAll");if(!r.ok)throw new Error("Network");return r.json()}
  async addLead(l){return(await fetch(this.u,{method:"POST",body:JSON.stringify({action:"addLead",lead:l})})).json()}
  async updateLead(l){return(await fetch(this.u,{method:"POST",body:JSON.stringify({action:"updateLead",lead:l})})).json()}
  async deleteLead(id){return(await fetch(this.u,{method:"POST",body:JSON.stringify({action:"deleteLead",id})})).json()}
  async saveReps(r){return(await fetch(this.u,{method:"POST",body:JSON.stringify({action:"saveReps",reps:r})})).json()}
}

function Setup({onDone,sUrl,sReps}){
  const[step,setStep]=useState(sUrl?2:1);
  const[url,setUrl]=useState(sUrl||"");
  const[testing,setTesting]=useState(false);
  const[res,setRes]=useState(null);
  const[names,setNames]=useState(sReps.length?sReps.map(r=>r.name):[""]);

  const test=async()=>{
    setTesting(true);setRes(null);
    try{const r=await fetch(url.trim()+"?action=getAll");const d=await r.json();if(d.error)throw new Error(d.error);setRes({ok:true});if(d.reps?.length)setNames(d.reps.map(r=>r.name));setTimeout(()=>setStep(2),600)}
    catch(e){setRes({ok:false,msg:e.message})}
    setTesting(false);
  };

  const save=async()=>{
    const v=names.filter(n=>n.trim());if(!v.length)return;
    const reps=v.map((n,i)=>({id:sReps[i]?.id||gid(),name:n.trim(),color:RCOL[i%RCOL.length]}));
    try{await new API(url.trim()).saveReps(reps)}catch(e){}
    onDone(url.trim(),reps);
  };

  return(
    <div className="anim" style={{padding:20,maxWidth:480,margin:"0 auto"}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <div className="mono" style={{fontSize:10,color:"rgba(129,140,248,0.6)",fontWeight:700,letterSpacing:2}}>DP DESIGN LIVING</div>
        <div style={{fontSize:26,fontWeight:800,marginTop:4}}><span style={{background:"linear-gradient(135deg,#818cf8,#c4b5fd)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>ASA 69</span></div>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.4)",marginTop:4}}>Booth Lead Tracker</div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:20,justifyContent:"center"}}>
        {["เชื่อมต่อ Sheets","ตั้งค่าทีม"].map((l,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:24,height:24,borderRadius:"50%",background:step>i+1?"#10b981":step===i+1?"#818cf8":"rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"#fff"}}>{step>i+1?"✓":i+1}</div>
            <span style={{fontSize:11,color:step===i+1?"#c7d2fe":"rgba(255,255,255,0.3)"}}>{l}</span>
          </div>
        ))}
      </div>

      {step===1&&(
        <div style={{background:"#0a0a0f",borderRadius:20,border:"1px solid rgba(255,255,255,0.06)",padding:20}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:6}}>🔗 เชื่อมต่อ Google Sheets</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginBottom:16,lineHeight:1.6}}>วาง Web App URL จาก Google Apps Script</div>
          <div className="lbl">Web App URL</div>
          <input className="fi" value={url} onChange={e=>{setUrl(e.target.value);setRes(null)}} placeholder="https://script.google.com/macros/s/xxxx/exec"/>
          {res&&<div style={{marginTop:10,padding:"8px 14px",borderRadius:10,fontSize:12,background:res.ok?"rgba(16,185,129,0.1)":"rgba(239,68,68,0.1)",border:`1px solid ${res.ok?"rgba(16,185,129,0.3)":"rgba(239,68,68,0.3)"}`,color:res.ok?"#34d399":"#f87171"}}>{res.ok?"✓ เชื่อมต่อสำเร็จ!":"✗ "+res.msg}</div>}
          <button className="btn bp" disabled={!url.trim()||testing} onClick={test} style={{width:"100%",marginTop:14}}>{testing?"⏳ กำลังทดสอบ...":"ทดสอบการเชื่อมต่อ"}</button>
          <details style={{marginTop:16}}>
            <summary style={{fontSize:12,color:"#818cf8",cursor:"pointer",fontWeight:600}}>📖 วิธีสร้าง Google Apps Script</summary>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",lineHeight:1.8,marginTop:10,padding:12,background:"rgba(255,255,255,0.02)",borderRadius:10}}>
              1. เปิด Google Sheets ใหม่ ตั้งชื่อ "ASA69 Leads"<br/>2. Extensions → Apps Script<br/>3. ลบโค้ดเดิม วางโค้ดจากไฟล์ google-apps-script.js<br/>4. Save (Ctrl+S)<br/>5. Deploy → New deployment<br/>6. Type = Web app<br/>7. Execute as = Me<br/>8. Who has access = Anyone<br/>9. Deploy → คัดลอก URL มาวางที่นี่
            </div>
          </details>
        </div>
      )}

      {step===2&&(
        <div style={{background:"#0a0a0f",borderRadius:20,border:"1px solid rgba(255,255,255,0.06)",padding:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}><span style={{fontSize:24}}>👥</span><div><div style={{fontSize:15,fontWeight:700}}>ตั้งค่าทีมเซลส์</div><div style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>สูงสุด 10 คน</div></div></div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
            {names.map((n,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:RCOL[i],display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:"#fff",flexShrink:0}}>{i+1}</div>
                <input className="fi" style={{flex:1}} value={n} onChange={e=>{const x=[...names];x[i]=e.target.value;setNames(x)}} placeholder={`เซลส์คนที่ ${i+1}`}/>
                {names.length>1&&<button onClick={()=>setNames(names.filter((_,j)=>j!==i))} style={{width:28,height:28,borderRadius:8,border:"1px solid rgba(239,68,68,0.2)",background:"rgba(239,68,68,0.08)",color:"#f87171",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>}
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            {names.length<10&&<button className="btn bg" onClick={()=>setNames([...names,""])} style={{padding:"10px 20px",fontSize:13}}>+ เพิ่มคน</button>}
            <button className="btn bp" onClick={save} style={{flex:1}}>✓ เริ่มใช้งาน</button>
          </div>
          <button onClick={()=>setStep(1)} style={{width:"100%",marginTop:10,padding:8,border:"none",background:"transparent",color:"rgba(255,255,255,0.3)",fontSize:12,cursor:"pointer"}}>← เปลี่ยน URL</button>
        </div>
      )}
    </div>
  );
}

function Form({onSubmit,reps,saving}){
  const[f,sF]=useState({name:"",phone:"",email:"",lineId:"",company:"",customerType:"",products:[],priority:"warm",note:"",day:DAYS[0],repId:reps[0]?.id||""});
  const[step,setStep]=useState(1);
  const u=(k,v)=>sF(p=>({...p,[k]:v}));
  const tp=id=>sF(p=>({...p,products:p.products.includes(id)?p.products.filter(x=>x!==id):[...p.products,id]}));
  const submit=()=>{
    if(!f.name.trim())return;
    const rep=reps.find(r=>r.id===f.repId);
    onSubmit({...f,id:gid(),timestamp:new Date().toISOString(),dateLabel:tdy(),repName:rep?.name||""});
    sF({name:"",phone:"",email:"",lineId:"",company:"",customerType:"",products:[],priority:"warm",note:"",day:f.day,repId:f.repId});
    setStep(1);
  };

  return(
    <div className="anim" style={{background:"#0a0a0f",borderRadius:20,border:"1px solid rgba(255,255,255,0.06)",overflow:"hidden"}}>
      <div style={{padding:"14px 20px",background:"rgba(129,140,248,0.04)",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
        <div className="lbl" style={{marginBottom:8}}>เซลส์ผู้บันทึก</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {reps.map(r=><button key={r.id} onClick={()=>u("repId",r.id)} className={`chip${f.repId===r.id?" on":""}`} style={f.repId===r.id?{borderColor:r.color,background:r.color+"20",color:r.color,fontWeight:700}:{}}><span style={{display:"inline-flex",width:18,height:18,borderRadius:"50%",background:r.color,alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:"#fff",marginRight:4,verticalAlign:"middle"}}>{r.name.charAt(0)}</span>{r.name}</button>)}
        </div>
      </div>
      <div style={{display:"flex",gap:4,padding:"14px 20px 0"}}>{[1,2,3].map(s=><div key={s} style={{flex:1,height:3,borderRadius:2,background:s<=step?"linear-gradient(90deg,#818cf8,#a78bfa)":"rgba(255,255,255,0.06)"}}/>)}</div>
      <div className="mono" style={{padding:"4px 20px 8px",fontSize:11,color:"rgba(255,255,255,0.3)"}}>STEP {step}/3 — {step===1?"ข้อมูลลูกค้า":step===2?"สินค้าที่สนใจ":"สรุปและบันทึก"}</div>

      <div style={{padding:"8px 20px 20px"}}>
        {step===1&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><div className="lbl">ชื่อ-นามสกุล *</div><input className="fi" value={f.name} onChange={e=>u("name",e.target.value)} placeholder="ชื่อลูกค้า" autoFocus/></div>
              <div><div className="lbl">เบอร์โทร</div><input className="fi" type="tel" value={f.phone} onChange={e=>u("phone",e.target.value)} placeholder="08x-xxx-xxxx"/></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><div className="lbl">LINE ID</div><input className="fi" value={f.lineId} onChange={e=>u("lineId",e.target.value)} placeholder="@lineid"/></div>
              <div><div className="lbl">Email</div><input className="fi" type="email" value={f.email} onChange={e=>u("email",e.target.value)} placeholder="email@example.com"/></div>
            </div>
            <div><div className="lbl">บริษัท / โครงการ</div><input className="fi" value={f.company} onChange={e=>u("company",e.target.value)} placeholder="ชื่อบริษัทหรือโครงการ"/></div>
            <div><div className="lbl">ประเภทลูกค้า</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{CTYPES.map(c=><button key={c} className={`chip${f.customerType===c?" on":""}`} onClick={()=>u("customerType",c)}>{c}</button>)}</div></div>
            <div><div className="lbl">วันที่</div><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{DAYS.map(d=><button key={d} className={`chip${f.day===d?" on":""}`} onClick={()=>u("day",d)} style={{fontSize:11,padding:"5px 12px"}}>{d}</button>)}</div></div>
          </div>
        )}
        {step===2&&(
          <div><div style={{fontSize:13,color:"rgba(255,255,255,0.5)",marginBottom:10}}>เลือกสินค้าที่ลูกค้าสนใจ</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {PRODUCTS.map(p=><button key={p.id} className={`pcard${f.products.includes(p.id)?" on":""}`} onClick={()=>tp(p.id)}><span style={{fontSize:22}}>{p.icon}</span><div><div style={{fontSize:13,fontWeight:600}}>{p.label}</div><div style={{fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:2}}>{p.brands.join(", ")}</div></div>{f.products.includes(p.id)&&<span style={{marginLeft:"auto",color:"#818cf8",fontSize:18}}>✓</span>}</button>)}
          </div></div>
        )}
        {step===3&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div><div className="lbl" style={{marginBottom:8}}>ระดับความสนใจ</div>
              <div style={{display:"flex",gap:8}}>{PRI.map(p=><button key={p.id} onClick={()=>u("priority",p.id)} style={{flex:1,padding:12,borderRadius:12,border:"2px solid",borderColor:f.priority===p.id?p.color:"rgba(255,255,255,0.06)",background:f.priority===p.id?p.color+"18":"rgba(255,255,255,0.02)",cursor:"pointer",textAlign:"center"}}><div style={{fontSize:18}}>{p.label.split(" ")[0]}</div><div style={{fontSize:12,color:f.priority===p.id?p.color:"rgba(255,255,255,0.5)",fontWeight:600,marginTop:4}}>{p.label.split(" ")[1]}</div><div style={{fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:2}}>{p.desc}</div></button>)}</div>
            </div>
            <div><div className="lbl">โน้ต</div><textarea className="fi" value={f.note} onChange={e=>u("note",e.target.value)} placeholder="งบประมาณ, ไทม์ไลน์, รุ่นที่สนใจ..."/></div>
            <div style={{background:"rgba(255,255,255,0.03)",borderRadius:12,padding:14,border:"1px solid rgba(255,255,255,0.05)"}}>
              <div className="lbl" style={{letterSpacing:1,marginBottom:8}}>สรุป</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,0.8)"}}><strong>{f.name||"—"}</strong> {f.customerType&&`(${f.customerType})`}</div>
              {f.company&&<div style={{fontSize:12,color:"rgba(255,255,255,0.5)",marginTop:2}}>{f.company}</div>}
              <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginTop:6,display:"flex",flexWrap:"wrap",gap:8}}>{f.phone&&<span>📱 {f.phone}</span>}{f.lineId&&<span>💬 {f.lineId}</span>}{f.email&&<span>✉️ {f.email}</span>}</div>
              {f.products.length>0&&<div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:4}}>{f.products.map(pid=>{const p=PRODUCTS.find(x=>x.id===pid);return<span key={pid} className="ptag">{p?.icon} {p?.label}</span>})}</div>}
              <div style={{marginTop:8,fontSize:11,color:"rgba(255,255,255,0.4)"}}>👤 {reps.find(r=>r.id===f.repId)?.name} · {f.day}</div>
            </div>
          </div>
        )}
        <div style={{display:"flex",gap:10,marginTop:16}}>
          {step>1&&<button className="btn bg" onClick={()=>setStep(s=>s-1)}>←</button>}
          <button className="btn bp" disabled={(step===1&&!f.name.trim())||saving} onClick={()=>{if(step<3)setStep(s=>s+1);else submit()}} style={{flex:1,opacity:saving?0.6:1}}>{saving?"⏳ บันทึก...":step<3?"ถัดไป →":"✓ บันทึกลูกค้า"}</button>
        </div>
      </div>
    </div>
  );
}

function Dash({leads,reps}){
  const[df,sdf]=useState("all");const[rf,srf]=useState("all");
  const fl=leads.filter(l=>(df==="all"||l.day===df)&&(rf==="all"||l.repId===rf));
  const total=fl.length,hot=fl.filter(l=>l.priority==="hot").length,warm=fl.filter(l=>l.priority==="warm").length;
  const pc={};PRODUCTS.forEach(p=>{pc[p.id]=0});fl.forEach(l=>l.products?.forEach(pid=>{pc[pid]=(pc[pid]||0)+1}));
  const sp=PRODUCTS.map(p=>({...p,count:pc[p.id]})).sort((a,b)=>b.count-a.count);const mpc=Math.max(...sp.map(p=>p.count),1);
  const dc={};DAYS.forEach(d=>{dc[d]=0});fl.forEach(l=>{if(l.day)dc[l.day]++});const mdc=Math.max(...Object.values(dc),1);
  const tc={};fl.forEach(l=>{if(l.customerType)tc[l.customerType]=(tc[l.customerType]||0)+1});const st=Object.entries(tc).sort((a,b)=>b[1]-a[1]);
  const rs=reps.map(r=>{const rl=fl.filter(l=>l.repId===r.id);return{...r,total:rl.length,hot:rl.filter(l=>l.priority==="hot").length,warm:rl.filter(l=>l.priority==="warm").length}}).sort((a,b)=>(b.hot*3+b.warm*1.5+b.total)-(a.hot*3+a.warm*1.5+a.total));
  const mrt=Math.max(...rs.map(r=>r.total),1);
  const ss={padding:"6px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.7)",fontSize:12,cursor:"pointer",outline:"none"};

  return(
    <div className="anim" style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
        <span className="mono" style={{fontSize:11,color:"rgba(255,255,255,0.3)",fontWeight:600,letterSpacing:1}}>FILTER</span>
        <select value={df} onChange={e=>sdf(e.target.value)} style={ss}><option value="all">ทุกวัน</option>{DAYS.map(d=><option key={d} value={d}>{d}</option>)}</select>
        <select value={rf} onChange={e=>srf(e.target.value)} style={ss}><option value="all">ทุกเซลส์</option>{reps.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}</select>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        {[{l:"ทั้งหมด",v:total,c:"#818cf8"},{l:"🔥 Hot",v:hot,c:"#ef4444"},{l:"☀️ Warm",v:warm,c:"#f59e0b"},{l:"Rate",v:total>0?Math.round(hot/total*100)+"%":"—",c:"#10b981"}].map((k,i)=>
          <div key={i} className="card" style={{textAlign:"center",padding:"12px 10px"}}><div className="mono" style={{fontSize:24,fontWeight:800,color:k.c}}>{k.v}</div><div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginTop:3,fontWeight:600}}>{k.l}</div></div>
        )}
      </div>
      <div className="card">
        <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",fontWeight:700,letterSpacing:1,marginBottom:12}}>🏆 SALES LEADERBOARD</div>
        {rs.map((r,i)=><div key={r.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <div style={{width:22,height:22,borderRadius:"50%",background:i===0&&r.total>0?"#fbbf24":r.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#fff",flexShrink:0}}>{i+1}</div>
          <div style={{width:70,fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.8)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</div>
          <div style={{flex:1,height:18,borderRadius:6,background:"rgba(255,255,255,0.03)",overflow:"hidden",display:"flex"}}>
            {r.hot>0&&<div style={{width:`${r.hot/mrt*100}%`,background:"#ef4444",minWidth:2}}/>}
            {r.warm>0&&<div style={{width:`${r.warm/mrt*100}%`,background:"#f59e0b",minWidth:2}}/>}
            {(r.total-r.hot-r.warm)>0&&<div style={{width:`${(r.total-r.hot-r.warm)/mrt*100}%`,background:"#6b7280",minWidth:2}}/>}
          </div>
          <div className="mono" style={{display:"flex",gap:6,fontSize:11,flexShrink:0}}><span style={{color:"#ef4444"}}>{r.hot}</span><span style={{color:"#f59e0b"}}>{r.warm}</span><span style={{color:"rgba(255,255,255,0.5)"}}>{r.total}</span></div>
        </div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div className="card">
          <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",fontWeight:700,letterSpacing:1,marginBottom:14}}>สินค้ายอดนิยม</div>
          {sp.map(p=><div key={p.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{fontSize:15,width:22}}>{p.icon}</span><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:11,color:"rgba(255,255,255,0.7)"}}>{p.label}</span><span className="mono" style={{fontSize:11,color:"#818cf8",fontWeight:700}}>{p.count}</span></div><div style={{height:5,borderRadius:3,background:"rgba(255,255,255,0.04)",overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,width:`${p.count/mpc*100}%`,background:"linear-gradient(90deg,#818cf8,#a78bfa)",transition:"width 0.5s"}}/></div></div></div>)}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div className="card">
            <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",fontWeight:700,letterSpacing:1,marginBottom:14}}>รายวัน</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:8,height:70}}>
              {DAYS.map(d=><div key={d} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><span className="mono" style={{fontSize:10,color:"#818cf8",fontWeight:700}}>{dc[d]}</span><div style={{width:"100%",borderRadius:5,height:`${Math.max(dc[d]/mdc*50,4)}px`,background:dc[d]>0?"linear-gradient(180deg,#818cf8,#6366f1)":"rgba(255,255,255,0.04)",transition:"height 0.5s"}}/><span style={{fontSize:9,color:"rgba(255,255,255,0.3)"}}>{d}</span></div>)}
            </div>
          </div>
          <div className="card" style={{flex:1}}>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",fontWeight:700,letterSpacing:1,marginBottom:10}}>ประเภทลูกค้า</div>
            {st.length?st.map(([t,c])=><div key={t} style={{marginBottom:6}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,color:"rgba(255,255,255,0.6)"}}>{t}</span><span className="mono" style={{fontSize:11,color:"#a78bfa",fontWeight:700}}>{c}</span></div></div>):<div style={{fontSize:12,color:"rgba(255,255,255,0.2)"}}>ยังไม่มีข้อมูล</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

function List({leads,reps,onDel,onUpd}){
  const[q,sQ]=useState("");const[rf,srf]=useState("all");const[eid,sEid]=useState(null);
  const fl=leads.filter(l=>(rf==="all"||l.repId===rf)&&(!q||l.name?.toLowerCase().includes(q.toLowerCase())||l.company?.toLowerCase().includes(q.toLowerCase())||l.phone?.includes(q)||l.repName?.toLowerCase().includes(q.toLowerCase())));

  const csv=()=>{
    const h=["เซลส์","ชื่อ","เบอร์โทร","LINE ID","Email","บริษัท","ประเภท","สินค้า","ระดับ","โน้ต","วัน","เวลา"];
    const rows=leads.map(l=>[l.repName,l.name,l.phone,l.lineId,l.email,l.company,l.customerType,(l.products||[]).map(pid=>PRODUCTS.find(p=>p.id===pid)?.label).join("; "),l.priority,l.note,l.day,l.timestamp?new Date(l.timestamp).toLocaleString("th-TH"):""]);
    const c="\uFEFF"+[h,...rows].map(r=>r.map(c=>`"${(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
    const b=new Blob([c],{type:"text/csv;charset=utf-8;"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`ASA69_Leads_${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(u);
  };

  return(
    <div className="anim">
      <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
        <input className="fi" value={q} onChange={e=>sQ(e.target.value)} placeholder="🔍 ค้นหา..." style={{flex:1,minWidth:120}}/>
        <select value={rf} onChange={e=>srf(e.target.value)} style={{padding:"10px 12px",borderRadius:10,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.7)",fontSize:12,outline:"none"}}><option value="all">ทุกเซลส์</option>{reps.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}</select>
        <button onClick={csv} style={{padding:"10px 14px",borderRadius:10,border:"1px solid rgba(129,140,248,0.3)",background:"rgba(129,140,248,0.08)",color:"#a5b4fc",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>📥 CSV</button>
      </div>
      <div className="mono" style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginBottom:8}}>{fl.length} รายการ</div>
      <div style={{maxHeight:460,overflowY:"auto"}}>
        {fl.map(l=>{const pr=PRI.find(p=>p.id===l.priority);const rep=reps.find(r=>r.id===l.repId);const ex=eid===l.id;return(
          <div key={l.id} style={{background:"rgba(255,255,255,0.02)",borderRadius:12,border:"1px solid rgba(255,255,255,0.05)",overflow:"hidden",marginBottom:6}}>
            <div onClick={()=>sEid(ex?null:l.id)} style={{padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:pr?.color,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:700,color:"rgba(255,255,255,0.9)"}}>{l.name}</div>{l.company&&<div style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>{l.company}</div>}</div>
              {rep&&<div style={{padding:"2px 8px",borderRadius:8,background:rep.color+"15",fontSize:10,color:rep.color,fontWeight:600}}>{rep.name}</div>}
              <span className="mono" style={{fontSize:10,color:"rgba(255,255,255,0.2)"}}>{l.day}</span>
              <span style={{color:"rgba(255,255,255,0.15)",fontSize:10}}>{ex?"▲":"▼"}</span>
            </div>
            {ex&&<div style={{padding:"0 14px 12px",borderTop:"1px solid rgba(255,255,255,0.04)"}}>
              <div style={{paddingTop:10,display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                {l.phone&&<span className="mchip">📱 {l.phone}</span>}{l.lineId&&<span className="mchip">💬 {l.lineId}</span>}{l.email&&<span className="mchip">✉️ {l.email}</span>}{l.customerType&&<span className="mchip">👤 {l.customerType}</span>}
              </div>
              {l.products?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>{l.products.map(pid=>{const p=PRODUCTS.find(x=>x.id===pid);return p?<span key={pid} className="ptag">{p.icon} {p.label}</span>:null})}</div>}
              {l.note&&<div style={{fontSize:11,color:"rgba(255,255,255,0.5)",background:"rgba(255,255,255,0.02)",padding:8,borderRadius:8,marginBottom:10}}>📝 {l.note}</div>}
              <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
                {PRI.map(p=><button key={p.id} onClick={()=>onUpd({id:l.id,priority:p.id})} style={{padding:"4px 10px",borderRadius:8,border:"1px solid",borderColor:l.priority===p.id?p.color:"rgba(255,255,255,0.06)",background:l.priority===p.id?p.color+"20":"transparent",color:l.priority===p.id?p.color:"rgba(255,255,255,0.3)",fontSize:11,cursor:"pointer"}}>{p.label.split(" ")[1]}</button>)}
                <div style={{flex:1}}/><button onClick={()=>{if(confirm("ลบ?"))onDel(l.id)}} style={{padding:"4px 10px",borderRadius:8,border:"1px solid rgba(239,68,68,0.2)",background:"rgba(239,68,68,0.08)",color:"#f87171",fontSize:11,cursor:"pointer"}}>🗑</button>
              </div>
            </div>}
          </div>
        )})}
        {!fl.length&&<div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,0.2)"}}>📋 ยังไม่มีข้อมูล</div>}
      </div>
    </div>
  );
}

function App(){
  const[apiUrl,setApiUrl]=useState(()=>{try{return localStorage.getItem("asa69_url")||""}catch{return""}});
  const[reps,setReps]=useState(()=>{try{const r=localStorage.getItem("asa69_reps");return r?JSON.parse(r):[]}catch{return[]}});
  const[leads,setLeads]=useState([]);
  const[tab,setTab]=useState("form");
  const[setup,setSetup]=useState(!apiUrl);
  const[conn,setConn]=useState(false);
  const[saving,setSaving]=useState(false);
  const[sync,setSync]=useState(null);
  const[toast,setToast]=useState(null);
  const api=useRef(null);

  const flash=(m,t="ok")=>{setToast({m,t});setTimeout(()=>setToast(null),2500)};

  const fetchData=async()=>{
    if(!api.current)return;
    try{const d=await api.current.getAll();if(d.leads)setLeads(d.leads);if(d.reps?.length){setReps(d.reps);localStorage.setItem("asa69_reps",JSON.stringify(d.reps))}setConn(true);setSync(new Date())}catch(e){setConn(false)}
  };

  useEffect(()=>{if(apiUrl){api.current=new API(apiUrl);fetchData()}},[apiUrl]);
  useEffect(()=>{if(!apiUrl)return;const iv=setInterval(fetchData,30000);return()=>clearInterval(iv)},[apiUrl]);

  const onSetup=(url,r)=>{localStorage.setItem("asa69_url",url);localStorage.setItem("asa69_reps",JSON.stringify(r));setApiUrl(url);setReps(r);setSetup(false)};
  const addLead=async l=>{setSaving(true);setLeads(p=>[l,...p]);try{await api.current.addLead(l);flash("✓ บันทึกสำเร็จ!");fetchData()}catch(e){flash("⚠️ บันทึกไม่ได้","w")}setSaving(false)};
  const updLead=async p=>{setLeads(prev=>prev.map(l=>l.id===p.id?{...l,...p}:l));try{await api.current.updateLead(p);fetchData()}catch(e){}};
  const delLead=async id=>{setLeads(p=>p.filter(l=>l.id!==id));try{await api.current.deleteLead(id);fetchData()}catch(e){}};

  if(setup)return<Setup onDone={onSetup} sUrl={apiUrl} sReps={reps}/>;

  return(
    <div>
      <div style={{padding:"12px 14px 0",background:"linear-gradient(180deg,rgba(129,140,248,0.08) 0%,transparent 100%)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div className="mono" style={{fontSize:9,color:"rgba(129,140,248,0.6)",fontWeight:700,letterSpacing:2}}>DP DESIGN LIVING</div>
            <div style={{fontSize:18,fontWeight:800,marginTop:1}}><span style={{background:"linear-gradient(135deg,#818cf8,#c4b5fd)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>ASA 69</span><span style={{color:"rgba(255,255,255,0.25)",fontWeight:400,fontSize:12,marginLeft:6}}>Lead Tracker</span></div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:12,background:conn?"rgba(16,185,129,0.08)":"rgba(239,68,68,0.08)",border:`1px solid ${conn?"rgba(16,185,129,0.2)":"rgba(239,68,68,0.2)"}`}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:conn?"#10b981":"#ef4444",animation:conn?"none":"blink 1s infinite"}}/><span style={{fontSize:10,color:conn?"#34d399":"#f87171"}}>{conn?"Online":"Offline"}</span>
            </div>
            <button onClick={()=>setSetup(true)} style={{padding:"4px 10px",borderRadius:8,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.03)",color:"rgba(255,255,255,0.4)",fontSize:10,cursor:"pointer"}}>⚙️</button>
            <button onClick={fetchData} style={{padding:"4px 10px",borderRadius:8,border:"1px solid rgba(129,140,248,0.2)",background:"rgba(129,140,248,0.06)",color:"#818cf8",fontSize:10,cursor:"pointer"}}>🔄</button>
          </div>
        </div>
        <div style={{display:"flex",gap:4,marginTop:8,flexWrap:"wrap"}}>
          {reps.map(r=>{const c=leads.filter(l=>l.repId===r.id).length;return<div key={r.id} style={{display:"flex",alignItems:"center",gap:3,padding:"2px 8px 2px 2px",borderRadius:14,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.05)"}}><div style={{width:18,height:18,borderRadius:"50%",background:r.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:800,color:"#fff"}}>{r.name.charAt(0)}</div><span style={{fontSize:10,color:"rgba(255,255,255,0.5)"}}>{r.name}</span><span className="mono" style={{fontSize:10,color:r.color,fontWeight:700}}>{c}</span></div>})}
        </div>
        <div style={{display:"flex",gap:2,marginTop:8}}>
          {[{id:"form",l:"➕ เพิ่ม"},{id:"dashboard",l:"📊 สถิติ"},{id:"leads",l:`📋 ${leads.length}`}].map(t=><button key={t.id} className={`tab${tab===t.id?" on":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>)}
        </div>
      </div>

      {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:1000,padding:"10px 20px",borderRadius:12,background:toast.t==="w"?"#f59e0b":"#10b981",color:"#fff",fontSize:13,fontWeight:700,boxShadow:"0 8px 30px rgba(0,0,0,0.3)",animation:"fadeIn 0.3s ease-out"}}>{toast.m}</div>}

      <div style={{padding:12}}>
        {tab==="form"&&<Form onSubmit={addLead} reps={reps} saving={saving}/>}
        {tab==="dashboard"&&<Dash leads={leads} reps={reps}/>}
        {tab==="leads"&&<List leads={leads} reps={reps} onDel={delLead} onUpd={updLead}/>}
      </div>

      {sync&&<div className="mono" style={{textAlign:"center",padding:8,fontSize:10,color:"rgba(255,255,255,0.15)"}}>Sync: {sync.toLocaleTimeString("th-TH")} · Auto 30s</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
